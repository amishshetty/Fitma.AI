<!DOCTYPE html>
  <html lang="en">
    <head>
      <script>
        window.addEventListener("error", function (e) {
          var errorNode = document.createElement("div");
          errorNode.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,0,0,0.9);color:white;z-index:99999;padding:20px;font-family:monospace;white-space:pre-wrap;overflow:auto;";
          errorNode.textContent = "CRASH: " + (e.error ? e.error.stack : e.message);
          document.body.appendChild(errorNode);
        });
      </script>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Fitma.ai Onboarding Flow</title>
      <meta name="description" content="Fitma.ai is an AI-driven nutrition companion that helps busy professionals effortlessly track meals and receive personalized dietary guidance." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
